spring:
  application:
    name: langgraph-hello

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7

server:
  port: 8080

logging:
  level:
    com.example.langgraph: DEBUG

# LangGraph4j Studio Web UI
# Access at: http://localhost:8080/studio
langgraph:
  studio:
    enabled: true
